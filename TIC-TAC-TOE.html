<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
width:320px;
margin:auto;
}

.cell{
width:100px;
height:100px;
border:2px solid black;
font-size:40px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

#winner{
text-align:center;
font-size:20px;
margin-top:20px;
}

</style>
</head>

<body>

<h1 style="text-align:center">Tic Tac Toe</h1>

<div class="board">

<div class="cell" id="c0"></div>
<div class="cell" id="c1"></div>
<div class="cell" id="c2"></div>

<div class="cell" id="c3"></div>
<div class="cell" id="c4"></div>
<div class="cell" id="c5"></div>

<div class="cell" id="c6"></div>
<div class="cell" id="c7"></div>
<div class="cell" id="c8"></div>

</div>

<p id="winner">Current Player : X</p>

<button id="reset">Reset Game</button>

<script src="script.js"></script>

</body>
</html>
